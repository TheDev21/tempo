<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create account — Tempo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --text: #1d1d1f;
      --text2: #6e6e73;
      --text3: #86868b;
      --border: #d2d2d7;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --error: #ff3b30;
      --font: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', sans-serif;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      -webkit-font-smoothing: antialiased;
    }
    .logo { font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: 2rem; letter-spacing: -0.3px; }
    .card {
      background: var(--surface);
      border-radius: 18px;
      padding: 2.5rem 2.25rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04);
    }
    h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; color: var(--text); margin-bottom: 0.35rem; }
    .sub { font-size: 0.875rem; color: var(--text2); margin-bottom: 2rem; }
    .field { margin-bottom: 1rem; }
    label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text2); margin-bottom: 0.4rem; }
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,0.15); }
    .hint { font-size: 0.75rem; color: var(--text3); margin-top: 0.35rem; }
    .error-msg {
      background: rgba(255,59,48,0.08);
      border: 1px solid rgba(255,59,48,0.2);
      color: var(--error);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.825rem;
      margin-bottom: 1rem;
      display: none;
    }
    .btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 980px;
      padding: 0.8rem;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .terms {
      font-size: 0.75rem;
      color: var(--text3);
      text-align: center;
      margin-top: 1.25rem;
      line-height: 1.5;
    }
    .divider { display: flex; align-items: center; gap: 0.75rem; margin: 1.5rem 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 0.75rem; color: var(--text3); }
    .footer-link { text-align: center; font-size: 0.825rem; color: var(--text3); }
    .footer-link a { color: var(--accent); text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
    .back-link { margin-top: 1.5rem; font-size: 0.8rem; color: var(--text3); text-decoration: none; }
    .back-link:hover { color: var(--text2); }
  </style>
</head>
<body>
  <div class="logo">Tempo</div>

  <div class="card">
    <h1>Create your account</h1>
    <p class="sub">Get your business set up in under a minute</p>

    <div class="error-msg" id="errorMsg"></div>

    <form id="signupForm">
      <div class="field">
        <label>Business name</label>
        <input type="text" id="name" placeholder="e.g. Joe's Barbershop" required />
      </div>
      <div class="field">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="At least 8 characters" required autocomplete="new-password" />
        <p class="hint">Must be at least 8 characters</p>
      </div>
      <button type="submit" class="btn" id="submitBtn">Create account</button>
    </form>

    <p class="terms">By creating an account you agree to our Terms of Service and Privacy Policy.</p>

    <div class="divider"><span>or</span></div>

    <p class="footer-link">Already have an account? <a href="/login">Sign in</a></p>
  </div>

  <a href="/" class="back-link">← Back to Tempo</a>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errorMsg');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Creating account…';
      try {
        const res = await fetch('/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: document.getElementById('name').value, email: document.getElementById('email').value, password: document.getElementById('password').value }),
        });
        const data = await res.json();
        if (res.ok) { window.location.href = '/dashboard'; }
        else { err.textContent = data.error || 'Signup failed'; err.style.display = 'block'; }
      } catch {
        err.textContent = 'Something went wrong. Try again.';
        err.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
